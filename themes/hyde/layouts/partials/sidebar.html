<div class="sidebar">
  <div class="container sidebar-sticky">
    <div class="sidebar-about">
      <a href="{{ .Site.BaseURL }}"><h1>{{ .Site.Title }}</h1></a>
      {{ with .Site.Params.subtitle }}<p class="subtitle">{{ . }}</p>{{ end }}
    </div>

    <ul class="sidebar-nav">
      <li><a href="/" class="{{ if eq .RelPermalink "/" }}active{{ end }}">Home</a></li>
      <li><a href="/photo" class="{{ if eq .RelPermalink "/photo/" }}active{{ end }}">Gallery</a></li>
    </ul>

    <div class="sidebar-footer">
      <p>© {{ now.Year }} Sun Minwen</p>
      <p style="margin-top:0.3rem;"><a href="https://github.com/smwswk" target="_blank">GitHub</a></p>
    </div>
  </div>
</div>
